name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Tag to release (e.g., v1.0.0). The tag must already exist.'
        required: true
        type: string

permissions:
  contents: write
  # Required by GoReleaser to publish the MCP server manifest to the
  # official MCP Registry via GitHub OIDC (see mcp section in .goreleaser.yaml).
  id-token: write

env:
  GO_VERSION: '1.25'

jobs:
  goreleaser:
    name: Build & Publish Release
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.get_version.outputs.version }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          # On workflow_dispatch (triggered by auto-tag.yml), check out the tag
          # so GoReleaser releases the tagged commit.
          ref: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.version || '' }}

      - name: Get version and validate tag matches VERSION file
        id: get_version
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            TAG="${{ github.event.inputs.version }}"
          else
            TAG="${GITHUB_REF#refs/tags/}"
          fi

          if [[ ! -f VERSION ]]; then
            echo "VERSION file not found" >&2
            exit 1
          fi

          FILE_VERSION=$(tr -d ' \n' < VERSION)
          if [[ "$TAG" != "$FILE_VERSION" ]]; then
            echo "Tag ($TAG) does not match VERSION file ($FILE_VERSION)" >&2
            exit 1
          fi

          echo "version=$TAG" >> "$GITHUB_OUTPUT"

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          # MCP Registry publication requires GoReleaser >= 2.13
          version: '~> v2'
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  update-docs:
    name: Update Documentation
    runs-on: ubuntu-latest
    needs: goreleaser
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update version in docs and plugins
        run: |
          VERSION="${{ needs.goreleaser.outputs.version }}"
          PLUGIN_VERSION=$(echo "$VERSION" | sed 's/^v//')

          sed -i "s/Version: v.*/Version: $VERSION/g" README.md || true

          find internal/server-plugins -name "*.go" -type f -exec sed -i "s/Version() string { return \"[^\"]*\"/Version() string { return \"$PLUGIN_VERSION\"/g" {} \;

      - name: Commit documentation and plugin updates
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add README.md internal/server-plugins/
          git diff --staged --quiet || git commit -m "docs: update version to ${{ needs.goreleaser.outputs.version }}"
          git push
