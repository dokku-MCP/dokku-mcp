name: LLM E2E Analysis

# Post-release analysis: runs a Mistral Vibe agent against the released
# binary connected to a real Dokku instance, then attaches the resulting
# report to the GitHub release created by the Release workflow (GoReleaser).
#
# Triggered via workflow_run (not `on: release`) because releases created
# with GITHUB_TOKEN do not fire release events.
on:
  workflow_run:
    workflows:
      - Release
    types:
      - completed
  workflow_dispatch:
    inputs:
      version:
        description: 'Release tag to analyze and attach the report to (e.g., v1.0.0)'
        required: true
        type: string

env:
  GO_VERSION: '1.25'

jobs:
  analysis:
    name: Mistral Vibe Agent Analysis
    runs-on: ubuntu-22.04
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.version || github.event.workflow_run.head_sha }}

      - name: Resolve release tag
        id: get_version
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            TAG="${{ github.event.inputs.version }}"
          else
            if [[ ! -f VERSION ]]; then
              echo "VERSION file not found" >&2
              exit 1
            fi
            TAG=$(tr -d ' \n' < VERSION)
          fi

          if [[ -z "$TAG" ]]; then
            echo "Could not resolve release tag" >&2
            exit 1
          fi

          echo "version=$TAG" >> "$GITHUB_OUTPUT"

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Build stdio MCP tool
        env:
          CGO_ENABLED: 0
        run: |
          mkdir -p build
          go build \
            -ldflags "-X main.Version=${{ steps.get_version.outputs.version }} -X main.BuildTime=$(date -u '+%Y-%m-%d_%H:%M:%S') -s -w" \
            -o build/dokku-mcp-stdio-tool \
            cmd/server/main.go

      - name: Install Dokku
        run: |
          echo "🐳 Installing Dokku on CI runner..."
          wget -qO- https://raw.githubusercontent.com/dokku/dokku/v0.34.0/bootstrap.sh | sudo bash
          sudo dokku plugin:install-dependencies --core
          sudo dokku events:on || true
          sudo usermod -aG dokku $USER
          echo "✅ Dokku installed: $(dokku version)"

      - name: Start SSH server
        run: |
          echo "🔐 Starting SSH server..."
          # Ensure sshd is installed and running
          sudo apt-get update
          sudo apt-get install -y openssh-server

          # Configure sshd to allow connections
          sudo sed -i 's/#PermitRootLogin.*/PermitRootLogin no/' /etc/ssh/sshd_config
          sudo sed -i 's/#PubkeyAuthentication.*/PubkeyAuthentication yes/' /etc/ssh/sshd_config
          sudo sed -i 's/#PasswordAuthentication.*/PasswordAuthentication no/' /etc/ssh/sshd_config

          # Start SSH service
          sudo systemctl enable ssh
          sudo systemctl start ssh
          sudo systemctl status ssh || true

          # Verify sshd is listening
          sleep 2
          sudo ss -tlnp | grep :22 || echo "Warning: sshd may not be listening"
          echo "✅ SSH server started"

      - name: Set up SSH access to Dokku
        run: |
          echo "🔑 Setting up SSH access to local Dokku..."
          mkdir -p ~/.ssh
          SSH_KEY_PATH="$HOME/.ssh/dokku_ci_key"
          ssh-keygen -t rsa -b 4096 -f "$SSH_KEY_PATH" -N "" -C "dokku-mcp-ci"

          # Add public key to Dokku (using cat to pipe, more reliable than <)
          cat "$SSH_KEY_PATH.pub" | sudo dokku ssh-keys:add ci-test

          # Verify the key was added
          sudo dokku ssh-keys:list || true

          # Configure SSH client with proper settings
          cat >> ~/.ssh/config << 'SSH_CONFIG'
          Host localhost 127.0.0.1
            HostName 127.0.0.1
            Port 22
            User dokku
            IdentityFile ~/.ssh/dokku_ci_key
            IdentitiesOnly yes
            StrictHostKeyChecking no
            UserKnownHostsFile /dev/null
            LogLevel DEBUG
          SSH_CONFIG
          chmod 600 ~/.ssh/config

          # Test SSH connection with verbose output
          echo "Testing SSH connection to Dokku..."
          ssh -v -o ConnectTimeout=10 dokku@127.0.0.1 version 2>&1 || echo "SSH test completed (may have warnings)"

          # Also test without -t flag (non-interactive)
          echo "Testing non-interactive SSH..."
          ssh -o ConnectTimeout=10 -o BatchMode=yes dokku@127.0.0.1 version || echo "Non-interactive test completed"

          echo "✅ SSH access configured"

      - name: Set up stdio MCP tool with Vibe config
        run: |
          chmod +x build/dokku-mcp-stdio-tool
          BINARY_PATH="$(pwd)/build/dokku-mcp-stdio-tool"
          SSH_KEY_PATH="$HOME/.ssh/dokku_ci_key"

          # Create dokku-mcp config for stdio mode with local Dokku
          # disable_pty is critical for CI environments where no TTY is available
          mkdir -p "${HOME}/.dokku-mcp"
          cat > "${HOME}/.dokku-mcp/config.yaml" << DOKKU_CONFIG
          transport:
            type: "stdio"
          log_level: "debug"
          ssh:
            host: "127.0.0.1"
            port: 22
            user: "dokku"
            key_path: "${SSH_KEY_PATH}"
            timeout: 30
            disable_pty: true
          cache_enabled: false
          DOKKU_CONFIG
          # Remove leading whitespace from each line (caused by YAML indentation)
          sed -i 's/^          //' "${HOME}/.dokku-mcp/config.yaml"

          echo "dokku-mcp config:"
          cat "${HOME}/.dokku-mcp/config.yaml"

          # Set up Vibe home directory with MCP server config
          VIBE_HOME="${HOME}/.vibe"
          mkdir -p "$VIBE_HOME"

          # Copy base config and append MCP server configuration
          cp .vibe/config.toml "$VIBE_HOME/config.toml"

          # Append the stdio MCP server configuration with the actual binary path
          printf '\n[[mcp_servers]]\nname = "dokku_mcp"\ntransport = "stdio"\ncommand = "%s"\nargs = []\nprompt = "Dokku MCP server connected to local Dokku instance for testing"\n' "$BINARY_PATH" >> "$VIBE_HOME/config.toml"

          echo "VIBE_HOME=$VIBE_HOME" >> $GITHUB_ENV
          echo "DOKKU_MCP_BINARY_PATH=$BINARY_PATH" >> $GITHUB_ENV
          echo "✅ Vibe config created with dokku_mcp MCP server"
          echo "Vibe config contents:"
          cat "$VIBE_HOME/config.toml"

      - name: Run Mistral Vibe Agent Analysis
        id: analysis
        uses: mistralai/mistral-vibe@main
        with:
          MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}
          prompt: |
            You have access to the dokku_mcp MCP server connected to a real Dokku instance.

            Your tasks:
            1. Discover and list all available MCP tools from the dokku_mcp server
            2. Test key tools against the live Dokku instance (app management, configuration, etc.)
            3. Verify error handling and edge cases
            4. Review the codebase for code quality, security, and Go best practices

            IMPORTANT: You MUST save your report to LLM_ANALYSIS_REPORT.md using the write_file tool.

            The report should include:
            - Summary of MCP tools discovered
            - Test results for each tool tested
            - Any issues or bugs found
            - Code quality observations
            - Recommendations for improvements

            Use markdown formatting with clear sections. Start with a header like:
            # LLM Analysis Report - dokku-mcp
        env:
          VIBE_HOME: ${{ env.VIBE_HOME }}

      - name: Find and prepare LLM analysis report
        if: always()
        run: |
          echo "🔍 Searching for LLM analysis report..."

          # Search for the file in various locations
          FOUND_FILE=""
          for path in \
            "LLM_ANALYSIS_REPORT.md" \
            "./LLM_ANALYSIS_REPORT.md" \
            "$HOME/LLM_ANALYSIS_REPORT.md" \
            "${{ github.workspace }}/LLM_ANALYSIS_REPORT.md" \
            "/home/runner/work/dokku-mcp/dokku-mcp/LLM_ANALYSIS_REPORT.md"; do
            if [[ -f "$path" ]]; then
              echo "✅ Found report at: $path"
              FOUND_FILE="$path"
              break
            fi
          done

          # Also search recursively in workspace
          if [[ -z "$FOUND_FILE" ]]; then
            echo "Searching recursively in workspace..."
            FOUND_FILE=$(find "${{ github.workspace }}" -name "LLM_ANALYSIS_REPORT.md" -type f 2>/dev/null | head -1)
            if [[ -n "$FOUND_FILE" ]]; then
              echo "✅ Found report at: $FOUND_FILE"
            fi
          fi

          if [[ -n "$FOUND_FILE" ]]; then
            cp "$FOUND_FILE" ./LLM_ANALYSIS_REPORT.md
            echo "📄 Report content preview:"
            head -50 ./LLM_ANALYSIS_REPORT.md
          else
            echo "⚠️ LLM analysis report not found in any expected location"
            echo "Creating placeholder report..."
            cat > ./LLM_ANALYSIS_REPORT.md << 'PLACEHOLDER'
          # LLM Analysis Report

          **Status**: Analysis completed but report not captured.

          The Mistral Vibe agent analysis was executed but the output report could not be retrieved.
          Please check the workflow logs for the analysis details.
          PLACEHOLDER
            sed -i 's/^          //' ./LLM_ANALYSIS_REPORT.md
          fi

          ls -la ./LLM_ANALYSIS_REPORT.md || true

      - name: Upload analysis report artifact
        uses: actions/upload-artifact@v6
        if: always()
        with:
          name: llm-analysis-report
          path: LLM_ANALYSIS_REPORT.md
          if-no-files-found: warn

      - name: Attach report to release
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.get_version.outputs.version }}"
          if [[ -f LLM_ANALYSIS_REPORT.md ]]; then
            gh release upload "$TAG" LLM_ANALYSIS_REPORT.md --clobber
            echo "✅ Report attached to release $TAG"
          else
            echo "⚠️ No report to attach"
          fi
